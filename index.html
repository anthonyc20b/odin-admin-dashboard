<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="user-options">
                <form action="/search" method="GET">
                    <!-- <label for="search">Search:</label> Replace with vector image -->
                    <input type="text" id="search" name="search" placeholder="Search here">
                </form>

                <p>Notifications</p>
                <p>Profile Image</p>
                <p>Morgan Oakley</p>
            </div>
            
            <div class="user-actions">
                <p>Profile image</p>
                <p>Hi there, Morgan Oakley (@morgan)</p>
                <button>New</button>
                <button>Upload</button>
                <Button>Share</Button>
            </div>
        </div>

        <div class="sidebar">
            <div class="logo">
                <p>Dashboard</p>
            </div>

            <div class="nav-list">
                <ul>
                    <li>Home</li>
                    <li>Profile</li>
                    <li>Messages</li>
                    <li>History</li>
                    <li>Tasks</li>
                    <li>Communities</li>
                </ul>
            </div>
            <div class="settings">
                <ul>
                    <li>Settings</li>
                    <li>Support</li>
                    <li>Privacy</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div class="projects">
                <h3>Projects</h3>
            </div>
            <div class="announcements">
                <h3>Announcements</h3>
            </div>
            <div class="trending">
                <h3>Trending</h3>
            </div>
        </div>
    </div>
</body>
</html>

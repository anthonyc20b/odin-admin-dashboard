<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="header">

            <div class="search-container">
                <img src="icons/magnify.svg" alt="magnifying glass" class="svg-image-small-black">  
                
                <div class="search-bar">
                    <form action="/search" method="GET">
                        <!-- <label for="search">Search:</label> Replace with vector image -->
                        <input type="text" id="search" name="search" placeholder="Search here" class="search-input">
                    </form>
                </div>

            </div>

            <div class="profile">
                <img src="icons/bell-ring-outline.svg" alt="notifications bell" class="svg-image-small-black">
                <img src="profiles/avatar-1.svg" alt="profile image" class="profile-img">
                <h3>Morgan Oakley</h3>
            </div>
            
            <div class="user-info">
                <p>Profile image</p>
                <p>Hi there, Morgan Oakley (@morgan)</p>
            </div>
            <div class="actions">
                <button>New</button>
                <button>Upload</button>
                <Button>Share</Button>
            </div>
        </div>

        <div class="sidebar">
            <div class="logo">
                <img src="icons/view-dashboard.svg" alt="dashboard" class="svg-image">
                <p>Dashboard</p>
            </div>

            <div class="nav-list">
                <ul>
                    <li><img src="icons/home.svg" alt="home" class="svg-image-small">Home</li>
                    <li><img src="icons/card-account-details.svg" alt="profile" class="svg-image-small">Profile</li>
                    <li><img src="icons/message-reply.svg" alt="messages" class="svg-image-small">Messages</li>
                    <li><img src="icons/clock-time-three.svg" alt="history" class="svg-image-small">History</li>
                    <li><img src="icons/note-multiple.svg" alt="note stack" class="svg-image-small">Tasks</li>
                    <li><img src="icons/account-group.svg" alt="group of people" class="svg-image-small">Communities</li>
                </ul>
            </div>
            <div class="settings">
                <ul>
                    <li><img src="icons/cog.svg" alt="cog" class="svg-image-small">Settings</li>
                    <li><img src="icons/help-box.svg" alt="question box" class="svg-image-small">Support</li>
                    <li><img src="icons/shield-check.svg" alt="shield check" class="svg-image-small">Privacy</li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div class="projects">
                <h3>Projects</h3>
            </div>
            <div class="announcements">
                <h3>Announcements</h3>
            </div>
            <div class="trending">
                <h3>Trending</h3>
            </div>
        </div>
    </div>
</body>
</html>
